.order-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

</style>


    <script>
        function displayOrders(){
            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            let container = document.getElementById("ordersContainer");
            container.innerHTML = "";

            if(orders.length === 0){
                container.innerHTML = "<p>No orders have been placed yet.</p>";
                return;
            }

            orders.forEach(function(order, index){
                container.innerHTML += `
                    <div class="order-box">
                        <h3>Order ${index + 1}</h3>
                        <p><b>Customer Name:</b> ${order.fullName}</p>
                        <p><b>Phone:</b> ${order.phone}</p>
                        <p><b>Email:</b> ${order.email}</p>
                        <p><b>Product:</b> ${order.product}</p>
                        <p><b>Flavour:</b> ${order.flavour}</p>
                        <p><b>Quantity:</b> ${order.quantity}</p>
                        <p><b>Pickup Date:</b> ${order.pickupDate}</p>
                        <p><b>Payment Method:</b> ${order.paymentMethod}</p>
                        <p><b>Status:</b> ${order.status ? order.status : "Pending"}</p>
                        <p><b>Feedback Sent:</b> ${order.feedback ? order.feedback : "No feedback yet"}</p>

                        <label><b>Send Feedback to Customer:</b></label><br>
                        <textarea id="feedback-${order.id}" placeholder="Write feedback for your beloved customer...">${order.feedback}</textarea><br>

                        <button onclick="saveFeedback(${order.id})">Send Feedback</button>
                        <button onclick="deleteOrder(${order.id})">Delete Order</button>
                    </div>
                `;
            });
        }

        function saveFeedback(orderId){
            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            let feedbackText = document.getElementById("feedback-" + orderId).value;

            orders = orders.map(function(order){
                if(order.id === orderId){
                    order.feedback = feedbackText;
                    order.status = "Responded";
                }
                return order;
            });

            localStorage.setItem("orders", JSON.stringify(orders));
            alert("Feedback has been saved for the customer.");
            displayOrders();
        }

        function deleteOrder(orderId){
            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            orders = orders.filter(function(order){
                return order.id !== orderId;
            });

            localStorage.setItem("orders", JSON.stringify(orders));
            displayOrders();
        }

        window.onload = displayOrders;
    </script>
